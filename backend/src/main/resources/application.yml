# ============================================
# AI漫剧生产平台 - 应用配置文件
# ============================================

server:
  port: 8080

spring:
  # 数据源配置 (MySQL 8.0+)
  datasource:
    url: jdbc:mysql://localhost:3306/ai_drama?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:123456}
      timeout: 3000ms

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Sa-Token 配置 (系分 2.4)
sa-token:
  token-name: Authorization
  timeout: 86400              # Token 有效期 24h (单位: 秒)
  active-timeout: 1800        # 活跃超时 30min (单位: 秒)
  is-concurrent: true         # 允许同端并发登录
  is-read-header: true        # 从 Header 中读取 Token
  token-prefix: Bearer        # Token 前缀

# MyBatis Plus 配置 (系分 2.5)
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.lanyan.aidrama.entity
  configuration:
    map-underscore-to-camel-case: true
    # 开发环境打印 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted    # 逻辑删除字段
      logic-delete-value: 1          # 已删除值
      logic-not-delete-value: 0      # 未删除值

# SpringDoc / Swagger 配置 (系分 2.7)
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

# Seedance AI 服务配置
seedance:
  api-url: https://api.seedance.com/v1
  api-key: ${SEEDANCE_API_KEY:}

# TOS (火山引擎 S3 兼容) 配置
tos:
  endpoint: ${TOS_ENDPOINT:}
  access-key: ${TOS_ACCESS_KEY:}
  secret-key: ${TOS_SECRET_KEY:}
  bucket-name: ${TOS_BUCKET:}
  base-url: ${TOS_BASE_URL:}
  presign-expire: 3600

# Actuator 安全配置 (系分 10.1)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    env:
      show-values: NEVER
